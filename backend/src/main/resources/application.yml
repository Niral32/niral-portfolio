spring:
  application:
    name: portfolio-backend
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:niralpatel988@gmail.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  datasource:
    # Local-dev defaults for PostgreSQL. In production we set DB_URL etc. as env vars.
    url: ${DB_URL:jdbc:postgresql://localhost:5432/portfolio_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
        # Force @Lob byte[] -> BLOB/BYTEA (not Postgres OID) so resume uploads work the same way on MySQL & PostgreSQL.
        type:
          preferred_jdbc_type_code_for_blob: 2004
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}
  error:
    include-message: always

portfolio:
  cors:
    # Comma-separated list. In production set this to the Vercel URL of the frontend.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}

jwt:
  secret: ${JWT_SECRET:ChangeThisToAtLeast256BitsOfRandomSecretKeyForProductionUseOnly!!}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

admin:
  username: ${ADMIN_USERNAME:admin}
  password: ${ADMIN_PASSWORD:niral2000}

# Notify Niral by email when someone submits the contact form.
# To enable: set MAIL_PASSWORD env var to a Gmail App Password (see SETUP-EMAIL.md).
notifications:
  email:
    enabled: ${NOTIFY_EMAIL_ENABLED:true}
    to: ${NOTIFY_EMAIL_TO:niralpatel988@gmail.com}
    from: ${NOTIFY_EMAIL_FROM:niralpatel988@gmail.com}

---
# MySQL profile: run with --spring.profiles.active=mysql (used locally on the Mac)
spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    url: jdbc:mysql://localhost:3306/portfolio_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
