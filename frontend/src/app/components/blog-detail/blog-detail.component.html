<section class="section">
  <div class="container narrow">
    @if (notFound()) {
      <h1 class="section-title">Post not found</h1>
      <p><a routerLink="/blog">← Back to all posts</a></p>
    } @else {
      @if (post(); as p) {
        <a class="back-link" routerLink="/blog">← Back to all posts</a>

        <div class="post-layout" [class.no-image]="!coverImageSrc()">
          @if (coverImageSrc()) {
            <div class="post-layout__image">
              <img [src]="coverImageSrc()" [alt]="p.title" />
            </div>
          }

          <div class="post-layout__body">
            <h1 class="post-title">{{ p.title }}</h1>
            <p class="post-meta">
              <time>{{ p.publishedAt | date: 'mediumDate' }}</time>
            </p>
            <div class="post-body" [innerHTML]="contentHtml()"></div>

            <div class="like-bar">
              <button type="button" class="like-btn" (click)="like()" [disabled]="liked()">
                <span class="heart" [class.filled]="liked()">♥</span>
                <span>{{ liked() ? 'You liked this' : 'Like' }}</span>
                <span class="count">{{ likeCount() }}</span>
              </button>
            </div>
          </div>
        </div>
      } @else {
        <p>Loading…</p>
      }
    }
  </div>
</section>
